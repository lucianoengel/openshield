<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="OpenShield — pipeline-native XDR and SOAR data security platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1C"/>
      <stop offset="0.5" stop-color="#0D1526"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <!-- subtle top hairline -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.5"/>
  <!-- glow behind shield -->
  <circle cx="150" cy="160" r="150" fill="url(#glow)"/>

  <!-- shield mark -->
  <g transform="translate(66,74) scale(0.72)">
    <path d="M128 24 L214 56 C214 56 214 132 214 148 C214 200 178 226 128 244 C78 226 42 200 42 148 C42 132 42 56 42 56 Z"
          fill="url(#shield)"/>
    <path d="M128 40 L200 66 C200 66 200 132 200 146 C200 190 170 212 128 228 C86 212 56 190 56 146 C56 132 56 66 56 66 Z"
          fill="none" stroke="#7DD3FC" stroke-width="3" opacity="0.55"/>
    <path d="M92 132 L118 160 L172 100" fill="none" stroke="#F8FBFF" stroke-width="18"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="292" y="152" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-1">
    <tspan fill="#EAF2FF">Open</tspan><tspan fill="url(#accent)">Shield</tspan>
  </text>

  <!-- tagline -->
  <text x="294" y="196" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="25" font-weight="500" fill="#8195B8">
    Pipeline-native XDR &#183; SOAR &#183; Zero-Trust Data Security Platform
  </text>

  <!-- pipeline motif -->
  <text x="294" y="240" font-family="'SF Mono', 'JetBrains Mono', Consolas, monospace" font-size="18" fill="#546488" letter-spacing="0.5">
    Event <tspan fill="#22D3EE">&#8594;</tspan> Classify <tspan fill="#22D3EE">&#8594;</tspan> Policy <tspan fill="#22D3EE">&#8594;</tspan> Decision <tspan fill="#22D3EE">&#8594;</tspan> Enforce <tspan fill="#22D3EE">&#8594;</tspan> Audit
  </text>

  <!-- domain chips -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#A9BCDE">
    <rect x="294" y="262" width="66" height="30" rx="15" fill="#141E33" stroke="#26324D"/>
    <text x="327" y="282" text-anchor="middle">DLP</text>
    <rect x="368" y="262" width="72" height="30" rx="15" fill="#141E33" stroke="#26324D"/>
    <text x="404" y="282" text-anchor="middle">HIPS</text>
    <rect x="448" y="262" width="86" height="30" rx="15" fill="#141E33" stroke="#26324D"/>
    <text x="491" y="282" text-anchor="middle">NTPS</text>
    <rect x="542" y="262" width="78" height="30" rx="15" fill="#141E33" stroke="#26324D"/>
    <text x="581" y="282" text-anchor="middle">SIEM</text>
    <rect x="628" y="262" width="118" height="30" rx="15" fill="#141E33" stroke="#26324D"/>
    <text x="687" y="282" text-anchor="middle">Zero Trust</text>
    <rect x="754" y="262" width="118" height="30" rx="15" fill="#141E33" stroke="#26324D"/>
    <text x="813" y="282" text-anchor="middle">Audit Ledger</text>
  </g>
</svg>
