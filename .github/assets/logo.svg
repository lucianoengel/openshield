<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="OpenShield logo">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DD3FC" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- shield body -->
  <path d="M128 24 L214 56 C214 56 214 132 214 148 C214 200 178 226 128 244 C78 226 42 200 42 148 C42 132 42 56 42 56 Z"
        fill="url(#shield)"/>
  <!-- inner edge highlight -->
  <path d="M128 40 L200 66 C200 66 200 132 200 146 C200 190 170 212 128 228 C86 212 56 190 56 146 C56 132 56 66 56 66 Z"
        fill="none" stroke="url(#edge)" stroke-width="3" opacity="0.7"/>
  <!-- hash-chained-ledger check: a check whose stroke reads as the pipeline verified -->
  <path d="M92 132 L118 160 L172 100" fill="none" stroke="#F8FBFF" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="92" cy="132" r="4.5" fill="#0B1220" opacity="0.35"/>
</svg>
