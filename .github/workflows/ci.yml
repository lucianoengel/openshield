name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    # Only Linux ships in Phase 1, but the agent must stay portable — the Connector
    # and Enforcer interfaces must not bake in Linux assumptions (docs/decisions.md D9).
    # Building on all three keeps that claim honest rather than aspirational.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  proto:
    # Generated code is committed so contributors need no protoc. This proves it
    # still matches its sources — hand-edited generated code is otherwise
    # invisible until something behaves strangely.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - name: generated code is current
        run: make proto-check

  invariants:
    # The contract tests are ordinary `go test`, run above on all platforms.
    # This job exists to name them, because a green check labelled "test" does
    # not communicate that these specific properties are being enforced.
    #
    #   TestActionEnumIsClosed                    the action set stays closed (D14)
    #   TestDecisionCarriesNoParameters           no action parameters can be smuggled in
    #   TestClassificationSummaryFieldSetIsExact  only four fields may cross the host boundary
    #   TestClassificationSummaryLeaksNothing     no secret or digest of it reaches the wire
    #   TestEnforcerIsolationFailsToCompile       an enforcer CANNOT see classifier internals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: contract and privacy invariants
        run: go test -run 'TestAction|TestDecision|TestClassification|TestEvent|TestFilesystem|TestEnforcerIsolation|TestTransportRejects|TestPhase1' -v ./internal/core/
      - name: pipeline invariants
        run: go test -run 'TestStage|TestDispatch|TestReentry|TestFailingStage|TestSlowStage|TestTimeouts|TestNoDecision|TestReplay' -v ./internal/core/
      - name: architectural fitness (necessary, not sufficient — see D26)
        run: go test -v ./internal/fitness/
      - name: doc honesty — no unqualified overclaims on claim surfaces (T-029)
        run: go test -v ./internal/doccheck/
      - name: core has no broker dependency
        run: ./scripts/check-core-deps.sh
      - name: core depends on no concrete capability (T-014)
        run: ./scripts/check-capability-boundary.sh
      - name: open code does not import enterprise code (T-021)
        run: ./scripts/check-opencore-boundary.sh check && ./scripts/check-opencore-boundary.sh --selftest
      - name: privileged agent has no parser dependency
        run: ./scripts/check-agent-deps.sh
      - name: enforcement dispatch + quarantine (post-decision, observe-only default)
        run: go test -count=1 -v ./internal/engine/ ./internal/enforcers/...
      - name: agent process-boundary invariants
        run: go test -run 'TestFrame|TestOversized|TestTruncated|TestClassifierError|TestUnreadable|TestByteCeiling|TestWorkerRefuses|TestPrivilegedTalks|TestWorkerTimeout' -v ./internal/agent/

  ledger:
    # The audit ledger's storage layer is tested against a REAL PostgreSQL.
    #
    # It has to be. The bug that motivated this job was invisible to every
    # in-memory test: TIMESTAMPTZ stores microseconds while the canonical
    # encoding commits to nanoseconds, so an entry sealed with a real
    # time.Now() verified as TAMPERED the moment it was read back. A fake
    # storage layer would have agreed with the code.
    #
    # OPENSHIELD_REQUIRE_POSTGRES turns the local skip into a hard failure
    # here, because an integration suite that skips silently and reports ok is
    # worse than no suite at all — it manufactures confidence.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openshield
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: openshield
        ports: ['55432:5432']
        options: >-
          --health-cmd "pg_isready -U openshield"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: audit ledger against real PostgreSQL
        env:
          OPENSHIELD_REQUIRE_POSTGRES: '1'
        run: go test -race -count=1 -v ./internal/store/...
      - name: a failed append is never silent
        run: go test -run 'TestUnreachableLedger|TestTimeoutIsRecorded|TestNoDecisionIsStillRecorded' -v ./internal/core/
      - name: CLI verifies, never hides a break, and separates its exit codes
        run: go test -count=1 -v ./internal/cli/
      - name: control plane persists agent telemetry (embedded NATS + Postgres)
        env:
          OPENSHIELD_REQUIRE_POSTGRES: "1"
        run: go test -count=1 -v ./internal/controlplane/
      - name: agent identity signing (per-agent keys, no shared secret)
        run: go test -count=1 -v ./internal/agent/identity/
      - name: walking skeleton — one event classify→policy→audit (real worker + Postgres)
        env:
          OPENSHIELD_REQUIRE_POSTGRES: "1"
        run: go test -count=1 -v ./internal/engine/

  # Still to come, each its own ticket:
  #
  # These substitute for the line-level review depth a non-coding maintainer
  # cannot provide (CONTRIBUTING.md).
