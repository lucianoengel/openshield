# systemd drop-in: record a clean stop (T-018 dead-man's-switch).
#
# Drop into: /etc/systemd/system/openshield-agent.service.d/heartbeat.conf
#
# The dead-man's-switch (D16) makes a SILENT agent detectable — the control plane
# flags a host that has gone quiet past a threshold. But a clean `systemctl stop`
# is benign, and it should be distinguishable from a suspicious vanish. This hook
# records the stop, so the case that stands out is "silent past threshold with NO
# stop record" — not an ordinary operator-initiated stop.
#
# Honest limit (D16): this is defeatable. Root can stop the agent, suppress the
# heartbeat, mask the unit, and block the control plane. The value is noticing the
# COMMON case (a died/stopped agent, a host gone offline), not defeating an
# adversary who owns both the host and the control plane. Overdue is a signal for
# a human, not proof of tampering.
[Service]
# Records a clean stop via the agent's own heartbeat/telemetry path. The exact
# invocation is finalised in packaging (T-027); this documents the required hook.
ExecStopPost=/usr/bin/openshield-agent record-stop
