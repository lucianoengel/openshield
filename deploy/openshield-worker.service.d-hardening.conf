# systemd drop-in for the OpenShield parser worker.
#
# These cgroup and namespace limits are the SUPERVISOR's half of T-012. The
# worker self-applies seccomp (no network) and decompression-bomb limits in
# process; a process cannot reliably set its own cgroup limits without privilege,
# so those live here. Do not move them into Go — an in-process cgroup limit
# without privilege is theatre.
#
# Drop into: /etc/systemd/system/openshield-worker.service.d/hardening.conf
[Service]
# Memory: hard cap, and NO swap — a bomb must hit the ceiling, not thrash disk.
MemoryMax=256M
MemorySwapMax=0
# CPU: one core's worth, so a slow/adversarial parse cannot starve the host.
CPUQuota=100%
# Process/thread cap: a fork bomb in a parser cannot exhaust the host's PIDs.
TasksMax=64
# Belt and braces alongside the in-process seccomp filter.
RestrictAddressFamilies=AF_UNIX
PrivateNetwork=true
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true
PrivateTmp=true
