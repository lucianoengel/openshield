syntax = "proto3";

package openshield.v1;

option go_package = "github.com/lucianoengel/openshield/internal/core/corev1;corev1";

import "google/protobuf/timestamp.proto";

// Action is CLOSED and TYPED. Not a string, not a struct carrying parameters.
//
// The threat is specific: a compromised control plane distributing a policy
// whose action is "upload this file to a URL" — at the enforcement point,
// indistinguishable from the platform's own telemetry. A closed enum makes that
// unexpressible rather than merely forbidden (D14). This is what makes "the
// server coordinates, it does not control" architectural rather than
// aspirational.
//
// Adding a member here must also edit schema_test.go. That speed bump is
// deliberate: this is the most security-sensitive field in the system.
enum Action {
  ACTION_UNSPECIFIED = 0;
  ACTION_ALLOW = 1;
  ACTION_ALERT = 2;
  ACTION_BLOCK = 3;
  ACTION_QUARANTINE_LOCAL = 4;
  ACTION_ENCRYPT_LOCAL = 5;
  ACTION_REDIRECT = 6;
  // Process control (Phase E / HIPS). The DELIBERATE expansion of the closed action
  // set (the T1 decision, owner-approved): an endpoint that can DENY an exec or KILL a
  // process. Each is a distinct typed verb with its own enforcer and guard — the action
  // vocabulary stays CLOSED (D14), it is widened by explicit decision, never opened to a
  // free-form command a compromised control plane could express.
  ACTION_DENY_EXEC = 7;     // refuse a process execution (the exec-time analogue of BLOCK)
  ACTION_KILL_PROCESS = 8;  // terminate a running process
}

// Decision is what the policy engine emits and the ONLY thing an enforcer sees.
//
// It is explainable to an investigator (reason, policy identity) and opaque
// about detection (no classifier ID, no pattern, no model, no matched content).
// Both properties matter: investigators need to know why, enforcers must not.
message Decision {
  string decision_id = 1;
  string event_id = 2;
  Action action = 3;
  // Confidence, not certainty. Classification is noisy by nature; a contract
  // that modelled decisions as certain would push that noise silently into
  // enforcement (D4). Range [0.0, 1.0], mandatory — there is no implicit 1.0.
  double confidence = 4;
  string reason = 5;
  string policy_id = 6;
  string policy_version = 7;
  google.protobuf.Timestamp decided_at = 8;
  // Version of the enrichment Context this decision was evaluated against.
  //
  // Added before any consumer existed, on the strength of the T-004 paper
  // design (docs/design-t004-peer-ueba.md): peer-baseline UEBA needs its risk
  // score to reach Policy, and without recording WHICH context version applied,
  // replay cannot reproduce a Decision — re-running against today's context
  // would legitimately produce a different answer.
  //
  // Empty in Phase 1: no Context exists yet. The field is here because
  // retrofitting one into a hash-chained audit ledger (T-009) would mean a
  // migration and a break in the chain's continuity.
  string context_version = 9;
}
