syntax = "proto3";

package openshield.v1;

option go_package = "github.com/lucianoengel/openshield/internal/core/corev1;corev1";

// AttestationReport carries a device's TPM quote from the endpoint to the gateway
// so the gateway can verify it and decide whether the device is hardware-attested
// (ZT-1). It carries EVIDENCE, not a verdict: note the absence of any self-asserted
// `attested` boolean — the gateway computes attestation from the quote against the
// device's enrolled AK and golden PCR baseline. A field the endpoint could set to
// `attested=true` would defeat the whole point of attestation, so it does not exist.
message AttestationReport {
  // The device's pseudonymous subject (D23), matching its enrollment.
  string subject = 1;
  // The server-issued nonce this quote answers (anti-replay; the gateway checks it
  // is a fresh nonce it issued and has not consumed).
  bytes nonce = 2;
  // The marshaled TPMS_ATTEST quote structure.
  bytes quote_attest = 3;
  // The ECDSA signature over quote_attest, as (r, s).
  bytes quote_sig_r = 4;
  bytes quote_sig_s = 5;
}

// AttestationEnrollRequest is step 1 of automated network enrollment (ZT-1): a
// device submits its EK, AK, and PCR state to enroll. The gateway proves the AK is
// genuine-TPM-resident by credential activation before recording it.
message AttestationEnrollRequest {
  string subject = 1;
  bytes ek_public = 2;   // marshaled EK TPM2B_PUBLIC
  bytes ak_public = 3;   // marshaled AK TPM2B_PUBLIC
  bytes ak_name = 4;     // the AK's TPM name (the challenge binds to it)
  map<uint32, bytes> golden = 5; // PCR index -> value, the device's baseline (TOFU)
}

// AttestationEnrollChallenge is the gateway's reply to step 1: a credential-
// activation challenge the device's TPM must activate. A non-empty error means the
// request was rejected (bad EK, etc.) and no enrollment is pending.
message AttestationEnrollChallenge {
  bytes credential_blob = 1;
  bytes encrypted_secret = 2;
  string error = 3;
}

// AttestationActivation is step 2: the device returns the secret it recovered by
// activating the challenge with its TPM.
message AttestationActivation {
  string subject = 1;
  bytes secret = 2;
}

// AttestationEnrollResult is the gateway's reply to step 2: enrolled is true only
// when the recovered secret matched, proving the AK genuine-TPM-resident.
message AttestationEnrollResult {
  bool enrolled = 1;
  string error = 2;
}
