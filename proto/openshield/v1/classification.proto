syntax = "proto3";

package openshield.v1;

option go_package = "github.com/lucianoengel/openshield/internal/core/corev1;corev1";

// DetectorType is a closed enum rather than a string. A free-form detector name
// can itself leak what it detected — a detector named for a customer, project or
// person — reintroducing the leak the summary type exists to prevent.
enum DetectorType {
  DETECTOR_TYPE_UNSPECIFIED = 0;
  DETECTOR_TYPE_CPF = 1;
  DETECTOR_TYPE_SSN = 2;
  DETECTOR_TYPE_CREDIT_CARD = 3;
  DETECTOR_TYPE_EMAIL = 4;
  DETECTOR_TYPE_PHONE = 5;
  // Secrets / credentials (Phase D2). Structural detectors — a PEM block, a
  // prefixed cloud key, a decodable JWT — so a hit is strong, low-FP evidence.
  DETECTOR_TYPE_PRIVATE_KEY = 6;
  DETECTOR_TYPE_AWS_ACCESS_KEY = 7;
  DETECTOR_TYPE_JWT = 8;
  DETECTOR_TYPE_API_TOKEN = 9;
  // International PII (Phase D2 remainder). IBAN has a mod-97 checksum (a strong
  // validator like CPF); health-data is keyword/dictionary evidence (weaker, no
  // checksum — its confidence is capped accordingly).
  DETECTOR_TYPE_IBAN = 10;
  DETECTOR_TYPE_HEALTH_DATA = 11;
  // An operator-authored custom rule (Phase D3). All custom rules report this single
  // generic type — a free-form per-rule name could leak what it detects, so the closed
  // enum is preserved. Per-rule policy routing (a rule id in the contract) is a follow-up.
  DETECTOR_TYPE_CUSTOM = 12;
  // US bank routing number (ABA), DLP. A weighted mod-10 checksum (a strong validator like
  // Luhn) plus the Federal Reserve leading-digit range — evidence between a checksumless
  // structural rule and a full check-digit scheme.
  DETECTOR_TYPE_ABA_ROUTING = 13;
  // Canadian Social Insurance Number (SIN), DLP. A Luhn checksum over the conventional
  // grouped format — strong, low-FP evidence (the grouping distinguishes it from a bare
  // 9-digit run and the checksum filters the rest).
  DETECTOR_TYPE_CA_SIN = 14;
  // US National Provider Identifier (NPI), healthcare DLP. A 10-digit id that begins with 1
  // or 2 and carries a Luhn checksum over the 80840-prefixed number — a real check-digit
  // scheme, so a hit is strong evidence.
  DETECTOR_TYPE_NPI = 15;
  // UK NHS number, healthcare DLP. A 10-digit patient id in the conventional 3-3-4 spaced
  // grouping with a weighted mod-11 check digit — strong, low-FP evidence.
  DETECTOR_TYPE_UK_NHS = 16;
  // US Employer Identification Number (EIN), DLP. A 2-7 hyphenated tax id whose two-digit
  // prefix must be an IRS-assigned campus code — structural (no checksum), so a moderate
  // confidence like SSN.
  DETECTOR_TYPE_EIN = 17;
  // An EXACT-DATA match (EDM, DLP-3): the content carries an actual value from the
  // operator's fingerprinted sensitive dataset — a SPECIFIC record, not merely its
  // format. A distinct type because it is a stronger, differently-routed signal than
  // a format hit, and it must not be conflated with the generic CUSTOM rule.
  DETECTOR_TYPE_EDM = 18;
  // An INDEXED DOCUMENT MATCH (IDM, DLP-3): the content contains a substantial
  // portion of a fingerprinted sensitive DOCUMENT (a contract, a source file) —
  // excerpt/reformat tolerant via k-gram shingles. Distinct from EDM (structured
  // data) so a policy can route a leaked document differently.
  DETECTOR_TYPE_IDM = 19;
  // A passport number (DLP-7): weak format (no checksum), so detected only NEAR a
  // "passport" context keyword — the low-false-positive way to catch it.
  DETECTOR_TYPE_PASSPORT = 20;
  // A driver's license (DLP-7): state-variable alphanumeric, context-REQUIRED
  // (the format alone is too generic to fire on its own).
  DETECTOR_TYPE_DRIVERS_LICENSE = 21;
  // India Aadhaar (DLP-7): a 12-digit id validated by the published Verhoeff checksum plus the
  // first-digit 2-9 constraint — a real check-digit scheme, so a hit is strong, low-FP evidence.
  DETECTOR_TYPE_AADHAAR = 22;
  // UK National Insurance Number (DLP-7): the [prefix][6 digits][suffix] format with the official
  // prefix-letter exclusions. No checksum, so context-REQUIRED (near a National-Insurance keyword).
  DETECTOR_TYPE_UK_NINO = 23;
}

// LocalMatch holds matched content. Host-only.
message LocalMatch {
  DetectorType detector_type = 1;
  double confidence = 2;
  string matched_text = 3;
  uint32 offset = 4;
}

// LocalClassification NEVER leaves the host. It exists as a separate type from
// ClassificationSummary rather than as a redaction step, because redaction is a
// runtime behaviour that gets skipped — a debug logger, a retry, a new code
// path. Two types make the mistake a compile error (D10).
message LocalClassification {
  string event_id = 1;
  repeated LocalMatch matches = 2;
}

// ClassificationSummary is the ONLY classification form permitted to cross the
// host boundary. Its field set is exactly these four and is asserted by test —
// no content, no hash, no fingerprint, no embedding (D10, D11).
message ClassificationSummary {
  string event_id = 1;
  DetectorType detector_type = 2;
  double confidence = 3;
  uint32 match_count = 4;
}
